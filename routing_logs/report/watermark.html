<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            transform-origin: center;
            z-index: 9999;
            pointer-events: none;
            user-select: text;
            white-space: nowrap;
            color: #CCCCCC;
            opacity: 0.5;
            font-family: "Helvetica Neue", "Liberation Sans", Arial, sans-serif;
            font-weight: 600;
            font-size: 17mm;
            line-height: 1;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="watermark">TEAM PACIFIC CORPORATION</div>
</body>
</html>
